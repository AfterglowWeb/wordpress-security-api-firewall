deptrac:
  paths:
    - ./inc

  exclude_files:
    - '#.*TestPolicy\\.php$#'

  layers:
    - name: Admin
      collectors:
        - type: className
          value: '^Bromate\\SecurityApiFirewall\\Admin\\.*'

    - name: Api
      collectors:
        - type: className
          value: '^Bromate\\SecurityApiFirewall\\Api\\.*'

    - name: Core
      collectors:
        - type: className
          value: '^Bromate\\SecurityApiFirewall\\Core\\.*'

    - name: Security
      collectors:
        - type: className
          value: '^Bromate\\SecurityApiFirewall\\Security\\.*'

    - name: Logs
      collectors:
        - type: className
          value: '^Bromate\\SecurityApiFirewall\\Logs\\.*'

  ruleset:
    Admin:
      - AdminPage
      - Documentation

    Api:
      - LoginBootsrap
      - PublicRequestBootstrap
      - RestRequestBootstrap

    Core:
      - Settings
      - Schema
      - Bootstrap

    Security:
      - Authentication
      - Firewall
      - IpEntry
      - Routes
      - Login
      - WordPress

    Logs:
     - Logger
     - LogsAjaxController
     - LogsRepository

  formatters:
    graphviz:
      groups:
        Admin:
          - Admin
        Runtime:
          - Api
          - Logger
        Features:
          - Security
